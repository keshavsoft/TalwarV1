<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tailwind Navbar Test</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Heroicons (SVG inline, no extra CDN needed) -->
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">
    <main class="flex-grow">
        <!-- NAVBAR -->

        <nav class="bg-gray-900 text-white relative z-50">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between relative">

                <!-- LEFT: BRAND -->
                <div class="text-lg font-semibold">
                    MyBrand
                </div>

                <!-- RIGHT: HAMBURGER (MOBILE ONLY) -->
                <button id="menuBtn" onclick="toggleMenu()" class="md:hidden text-2xl select-none">
                    ☰
                </button>

                <!-- RIGHT: MENU -->
                <ul id="menu" class="absolute left-0 top-full w-full bg-gray-800
overflow-hidden max-h-0 opacity-0 transition-all duration-300
flex-col space-y-4 px-6 py-4
md:static md:flex md:flex-row md:bg-transparent md:shadow-none
md:space-y-0 md:space-x-10 md:p-0 md:w-auto md:max-h-none md:opacity-100" transition-all duration-300 ease-in-out>

                    <!-- ITEM -->
                    <li onclick="closeMenu()"
                        class="flex justify-between items-center md:flex-col md:items-center cursor-pointer hover:bg-gray-700 px-2 py-1 rounded transition-colors duration-200">
                        <span class="md:order-2 font-medium">Home</span>
                        <svg class="w-6 h-6 md:order-1 md:mb-1" stroke-width="0.75" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"
                                d="M3 10l9-7 9 7v10a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V10z" />
                        </svg>
                    </li>


                    <li onclick="closeMenu()"
                        class="flex justify-between items-center md:flex-col md:items-center cursor-pointer hover:bg-gray-700 px-2 py-1 rounded transition-colors duration-200">
                        <span class="md:order-2 font-medium">Ledgers</span>
                        <svg class="w-6 h-6 md:order-1 md:mb-1" stroke-width="0.75" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"
                                d="M3 7h18M3 12h18M3 17h18" />
                        </svg>
                    </li>


                    <li id="StockItemsId"
                        class="flex justify-between items-center md:flex-col md:items-center cursor-pointer hover:bg-gray-700 px-2 py-1 rounded transition-colors duration-200">
                        <span class="md:order-2 font-medium">StockItems</span>
                        <svg class="w-6 h-6 md:order-1 md:mb-1" stroke-width="0.75" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"
                                d="M20 13V7a2 2 0 00-2-2h-3V3H9v2H6a2 2 0 00-2 2v6m16 0v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6m16 0H4" />
                        </svg>
                    </li>


                    <li onclick="closeMenu()"
                        class="flex justify-between items-center md:flex-col md:items-center cursor-pointer hover:bg-gray-700 px-2 py-1 rounded transition-colors duration-200">
                        <span class="md:order-2 font-medium">Bills</span>
                        <svg class="w-6 h-6 md:order-1 md:mb-1" stroke-width="0.75" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"
                                d="M9 14l2 2 4-4M7 7h10M7 11h10M5 3h14a2 2 0 012 2v16l-3-2-3 2-3-2-3 2-3-2-3 2V5a2 2 0 012-2z" />
                        </svg>
                    </li>

                </ul>
            </div>
        </nav>

        <!-- table -->
        <div class="max-w-6xl mx-auto p-4">

            <!-- SCROLL CONTAINER -->
            <div class="rounded-lg shadow-md">

                <table class="w-full bg-white">

                    <!-- HEADER -->
                    <thead class="bg-gray-300 sticky top-0 z-10">
                        <tr class="text-gray-800">
                            <th class="w-16 px-4 py-3 text-left font-semibold border-r">#</th>
                            <th class="w-1/2 px-4 py-3 text-left font-semibold border-r">SzCode</th>
                            <th class="px-4 py-3 text-left font-semibold">SzName</th>
                        </tr>
                    </thead>

                    <!-- BODY -->
                    <tbody id="tableBody" class="text-gray-700">
                    </tbody>

                </table>
            </div>

        </div>
    </main>
    <footer class="bg-gray-200 text-gray-700 text-center py-4">
        <div class="max-w-6xl mx-auto px-4">
            © 2026 KeshavSoft • Contact
        </div>
    </footer>

    <template id="rowTemplate">
        <tr class="border-t hover:bg-blue-100 odd:bg-gray-100">
            <td class="px-4 py-2 border text-right"></td>
            <td class="px-4 py-2 border"></td>
            <td class="px-4 py-2 border"></td>
        </tr>
    </template>

    <script type="module" src="./Index/start.js"></script>
</body>

</html>
